<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Pulse — Fleet Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b111c; --panel:#111a29; --panel-2:#0e1622; --line:#1e2c40;
    --ink:#e8eef7; --muted:#7b8aa3; --faint:#4a5a72;
    --ok:#35d0a5; --watch:#e7b84b; --risk:#f0864b; --crit:#f2555a;
    --glow:rgba(53,208,165,.35);
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --disp:"Space Grotesk",system-ui,-apple-system,Segoe UI,sans-serif;
    --body:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);
    background-image:radial-gradient(1200px 600px at 80% -10%,#13233a55,transparent);}
  a{color:inherit}

  /* header */
  header{display:flex;align-items:center;gap:18px;padding:18px 28px;border-bottom:1px solid var(--line);}
  .logo{display:flex;align-items:center;gap:12px}
  .logo .beat{width:12px;height:12px;border-radius:50%;background:var(--ok);
    box-shadow:0 0 0 0 var(--glow);animation:ping 2s infinite;}
  @keyframes ping{0%{box-shadow:0 0 0 0 var(--glow)}70%{box-shadow:0 0 0 12px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .logo h1{font-family:var(--disp);font-size:20px;letter-spacing:.14em;text-transform:uppercase;margin:0;font-weight:700}
  .logo span{color:var(--muted);font-size:11px;letter-spacing:.22em;text-transform:uppercase;display:block;margin-top:2px}
  .head-meta{margin-left:auto;display:flex;gap:26px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .head-meta b{color:var(--ink);font-weight:500}
  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:9px 14px;border-radius:7px;cursor:pointer}
  .btn:hover{border-color:var(--ok);color:var(--ok)}

  .wrap{padding:24px 28px 60px;max-width:1400px;margin:0 auto}

  /* pulse banner */
  .monitor{position:relative;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;
    padding:0;overflow:hidden;height:150px;margin-bottom:22px}
  .monitor svg{position:absolute;inset:0;width:100%;height:100%}
  .monitor .grid-lines{stroke:#182437;stroke-width:1}
  .monitor .overlay{position:absolute;inset:0;display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px;pointer-events:none}
  .monitor .readout{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.06em}
  .monitor .readout b{display:block;font-size:28px;color:var(--ink);font-weight:500;margin-top:2px;letter-spacing:0}
  .bpm{text-align:right}
  .bpm .n{font-family:var(--disp);font-size:34px;font-weight:700}

  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
  .kpi:hover{transform:translateY(-1px);border-color:#2c3d57}
  .kpi .lab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .kpi .val{font-family:var(--disp);font-size:40px;font-weight:700;line-height:1;margin-top:8px}
  .kpi .bar{height:3px;border-radius:2px;margin-top:12px;background:var(--line)}
  .kpi .hint{position:absolute;top:12px;right:14px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);opacity:0;transition:opacity .15s}
  .kpi:hover .hint{opacity:1}
  .kpi.ok .val{color:var(--ok)} .kpi.ok .bar{background:var(--ok)}
  .kpi.watch .val{color:var(--watch)} .kpi.watch .bar{background:var(--watch)}
  .kpi.risk .val{color:var(--risk)} .kpi.risk .bar{background:var(--risk)}
  .kpi.crit .val{color:var(--crit)} .kpi.crit .bar{background:var(--crit)}
  .kpi.sel.ok{border-color:var(--ok)} .kpi.sel.watch{border-color:var(--watch)}
  .kpi.sel.risk{border-color:var(--risk)} .kpi.sel.crit{border-color:var(--crit)}
  .kpi.sel .hint{opacity:1;color:var(--ink)}

  /* controls: search / filter / sort */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
  .search{flex:1;min-width:150px;font-family:var(--mono);font-size:13px;background:var(--panel);
    border:1px solid var(--line);color:var(--ink);padding:9px 12px;border-radius:8px}
  .search::placeholder{color:var(--faint)}
  .search:focus,.select:focus{outline:none;border-color:var(--ok)}
  .select{font-family:var(--mono);font-size:12px;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);padding:9px 10px;border-radius:8px;cursor:pointer}
  .count{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:10px}
  .count b{color:var(--ink);font-weight:500}
  .list-scroll{max-height:calc(100vh - 130px);overflow-y:auto;padding-right:6px;margin-right:-6px}
  .list-scroll::-webkit-scrollbar{width:8px}
  .list-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .list-scroll::-webkit-scrollbar-track{background:transparent}
  .list-empty{color:var(--muted);font-family:var(--mono);font-size:13px;text-align:center;
    padding:36px 0;border:1px dashed var(--line);border-radius:12px}

  /* main split */
  .split{display:grid;grid-template-columns:1.15fr 1fr;gap:22px;align-items:start}
  .section-title{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}

  /* device cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border-color .15s,transform .15s}
  .card:hover{border-color:#2c3d57;transform:translateY(-1px)}
  .card.active{border-color:var(--ok);box-shadow:0 0 0 1px var(--ok) inset}
  .card-top{display:flex;align-items:center;gap:12px}
  .rank{font-family:var(--mono);font-size:12px;color:var(--faint);width:22px}
  .did{font-family:var(--disp);font-size:17px;font-weight:500}
  .model{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:2px}
  .status-tag{margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid}
  .t-ok{color:var(--ok);border-color:#1d4d42;background:#0f231e}
  .t-watch{color:var(--watch);border-color:#4d431d;background:#231f0f}
  .t-risk{color:var(--risk);border-color:#4d331d;background:#231a0f}
  .t-crit{color:var(--crit);border-color:#4d1d22;background:#230f11}
  .score-row{display:flex;align-items:center;gap:12px;margin:12px 0 10px}
  .score-track{flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden}
  .score-fill{height:100%;border-radius:4px}
  .score-num{font-family:var(--mono);font-size:13px;color:var(--ink);width:38px;text-align:right}
  .sigs{display:flex;gap:8px;flex-wrap:wrap}
  .sig{font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--line);display:flex;gap:6px;align-items:center}
  .sig .dot{width:7px;height:7px;border-radius:50%}
  .sig .k{color:var(--muted)}
  .tier-0{--c:var(--ok)} .tier-1{--c:var(--watch)} .tier-2{--c:var(--risk)} .tier-3{--c:var(--crit)}
  .sig .dot{background:var(--c)} .sig .v{color:var(--c)}

  /* patient impact — a separate axis (violet), informational only */
  .crit-pill{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 8px;border-radius:20px;border:1px solid var(--ci);color:var(--ci);background:#150f22}
  .ci-cc{--ci:#c084fc} .ci-dg{--ci:#8b9bde} .ci-sc{--ci:#5b6a8a} .ci-rs{--ci:#4a5a72}
  .impact-chip{font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:6px;
    border:1px solid #2a1f3d;display:flex;gap:6px;align-items:center;color:var(--im)}
  .impact-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--im)}
  .impact-chip .k{color:var(--muted)}
  .im-0{--im:#4a5a72} .im-1{--im:#8b9bde} .im-2{--im:#e7b84b} .im-3{--im:#c084fc}
  .impact-block{margin-top:18px;padding:14px 16px;border-radius:10px;border:1px solid #2a1f3d;background:#140f1f}
  .impact-block .lab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#a78bfa;margin-bottom:2px;display:flex;justify-content:space-between}
  .impact-block .note{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.04em}
  .impact-block .worst{font-family:var(--disp);font-size:18px;font-weight:500;margin:6px 0 4px;color:var(--im)}
  .impact-block .sub{font-size:13px;color:#aeb9cc;line-height:1.5}
  .impact-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:12px;background:var(--line)}
  .impact-bar span{display:block}
  .impact-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .impact-legend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

  /* detail panel */
  .detail{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;position:sticky;top:20px}
  .detail .empty{color:var(--muted);font-family:var(--mono);font-size:13px;text-align:center;padding:40px 0}
  .d-head{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}
  .d-head h2{font-family:var(--disp);font-size:26px;margin:0;font-weight:700}
  .d-meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:auto;text-align:right;line-height:1.5}
  .page-link{display:inline-block;margin-bottom:16px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ok);text-decoration:none;border:1px solid #1d4d42;background:#0f231e;padding:7px 12px;border-radius:7px}
  .page-link:hover{background:#123027}
  .signal-block{margin-bottom:14px}
  .signal-block .row{display:flex;justify-content:space-between;align-items:center}
  .signal-block .name{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .signal-block .lab{font-family:var(--disp);font-size:16px;font-weight:500;color:var(--c)}
  .signal-block .exp{font-size:13px;color:#aeb9cc;margin-top:4px;line-height:1.5}
  .action{margin-top:18px;padding:14px 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2)}
  .action .lab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .action .txt{font-size:14px;line-height:1.5}
  .reasons{margin:14px 0 0;padding:0;list-style:none}
  .reasons li{font-size:13px;color:#aeb9cc;padding:6px 0 6px 16px;position:relative;line-height:1.5;border-top:1px solid var(--line)}
  .reasons li:before{content:"›";position:absolute;left:0;color:var(--ok)}

  .upload{display:flex;gap:10px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .upload input[type=file]{display:none}
  footer{margin-top:36px;font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;letter-spacing:.08em}

  @media(max-width:920px){.split{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.detail{position:static}.head-meta{display:none}}
  @media(prefers-reduced-motion:reduce){ #pulsePath{animation:none!important}.logo .beat{animation:none}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="beat" id="logoBeat"></div>
    <div><h1>Device Pulse</h1><span>Predictive maintenance · lab analysers</span></div>
  </div>
  <div class="head-meta">
    <div>SOURCE<br><b id="mSource">—</b></div>
    <div>AS OF<br><b id="mAsOf">—</b></div>
    <label class="btn upload">Upload log
      <input type="file" id="upEvents" accept=".csv">
    </label>
    <button class="btn" id="reload">Sample fleet</button>
  </div>
</header>

<div class="wrap">
  <!-- pulse monitor signature -->
  <div class="monitor">
    <svg id="grid" preserveAspectRatio="none" viewBox="0 0 1000 150">
      <g class="grid-lines" id="gridG"></g>
      <path id="pulsePath" fill="none" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></path>
    </svg>
    <div class="overlay">
      <div class="readout">FLEET RHYTHM<b id="fleetVerdict">Reading…</b></div>
      <div class="readout bpm">DEVICES MONITORED<b class="n" id="fleetTotal">—</b></div>
    </div>
  </div>

  <!-- KPI strip -->
  <div class="kpis" id="kpis"></div>

  <div class="split">
    <div>
      <div class="controls">
        <input id="search" class="search" placeholder="Search device or model…" autocomplete="off">
        <select id="critFilter" class="select" title="Filter by device criticality">
          <option value="all">All criticality</option>
          <option>Critical Care</option>
          <option>Diagnostic</option>
          <option>Screening</option>
          <option>Research</option>
        </select>
        <select id="sortBy" class="select" title="Sort the fleet">
          <option value="risk">Sort: Risk</option>
          <option value="age">Sort: Age</option>
          <option value="crit">Sort: Criticality</option>
          <option value="impact">Sort: Patient impact</option>
        </select>
        <button class="btn" id="clearFilters">Clear</button>
      </div>
      <div class="count" id="count">—</div>
      <div class="list-scroll"><div id="deviceList"></div></div>
    </div>
    <div>
      <p class="section-title">Device detail</p>
      <div class="detail" id="detail"><div class="empty">Select a device to inspect its signals.</div></div>
    </div>
  </div>

  <footer>DEVICE PULSE · decision-support only · 90-day window vs 9-month baseline</footer>
</div>

<script>
const C = {ok:'#35d0a5',watch:'#e7b84b',risk:'#f0864b',crit:'#f2555a'};
const STATUS_CLASS = {'Healthy':'ok','Watch':'watch','At Risk':'risk','Critical':'crit'};

// map each signal label to a severity tier 0..3 for colouring
const TIER = {
  Normal:0, Elevated:1, High:2, Critical:3,
  Stable:0, Worsening:1, Escalating:3,
  Distributed:0, Emerging:1, Concentrated:2, Dominant:3
};
const tierColor = t => [C.ok,C.watch,C.risk,C.crit][t];

// patient impact (informational, separate axis)
const CRIT_CLASS = {'Critical Care':'cc','Diagnostic':'dg','Screening':'sc','Research':'rs'};
const IMPACT_LEVELS = ['None','Repeat Test','Delayed Result','Misdiagnosis Risk'];
const IMPACT_RANK = {'None':0,'Repeat Test':1,'Delayed Result':2,'Misdiagnosis Risk':3};
const IMPACT_HEX = ['#4a5a72','#8b9bde','#e7b84b','#c084fc'];
const CRIT_RANK = {'Critical Care':3,'Diagnostic':2,'Screening':1,'Research':0};

let DATA = null;              // full payload from the API
let view = [];                // current filtered + sorted device list
let current = null;           // selected device_id (survives re-filter/sort)
const filters = {q:'', status:null, crit:'all', sort:'risk'};

function drawGrid(){
  const g = document.getElementById('gridG'); let s='';
  for(let x=0;x<=1000;x+=40) s+=`<line x1="${x}" y1="0" x2="${x}" y2="150"/>`;
  for(let y=0;y<=150;y+=30) s+=`<line x1="0" y1="${y}" x2="1000" y2="${y}"/>`;
  g.innerHTML = s;
}

// build a repeating ECG-style waveform; intensity scales spike sharpness
function pulsePath(intensity){
  // intensity 0 = calm, 1 = sharp/critical
  const mid=75, beat=140, amp=18+intensity*34, dip=8+intensity*8;
  let d='M0,'+mid, x=0;
  while(x<1200){
    d+=` L${x+40},${mid}`;                     // baseline
    d+=` L${x+52},${mid+dip}`;                  // small dip
    d+=` L${x+60},${mid-amp}`;                  // R spike up
    d+=` L${x+68},${mid+amp*0.7}`;              // S down
    d+=` L${x+78},${mid}`;                      // return
    x+=beat;
  }
  return d;
}

function renderMonitor(data){
  const worst = data.counts.Critical>0 ? 3 : (data.counts['At Risk']>0?2:(data.counts.Watch>0?1:0));
  const intensity=[0.15,0.45,0.7,1][worst];
  const col=[C.ok,C.watch,C.risk,C.crit][worst];
  const path=document.getElementById('pulsePath');
  path.setAttribute('d',pulsePath(intensity));
  path.setAttribute('stroke',col);
  path.style.filter=`drop-shadow(0 0 6px ${col}88)`;
  // scrolling animation, faster when more critical
  const dur=[6,4.5,3.2,2][worst];
  path.style.transformBox='fill-box';
  path.animate([{transform:'translateX(0)'},{transform:'translateX(-140px)'}],
    {duration:dur*1000,iterations:Infinity,easing:'linear'});
  const verdict=['All nominal','Minor watch items','Attention required','Critical device present'][worst];
  document.getElementById('fleetVerdict').textContent=verdict;
  document.getElementById('fleetVerdict').style.color=col;
  document.getElementById('fleetTotal').textContent=data.total;
  document.getElementById('logoBeat').style.background=col;
  document.getElementById('logoBeat').style.setProperty('--glow',col+'55');
}

function renderKPIs(data){
  const defs=[['Healthy','ok',data.counts.Healthy],['Watch','watch',data.counts.Watch],
    ['At Risk','risk',data.counts['At Risk']],['Critical','crit',data.counts.Critical]];
  const kpis=document.getElementById('kpis');
  kpis.innerHTML=defs.map(([lab,cls,n])=>{
    const sel=filters.status===lab;
    return `<div class="kpi ${cls}${sel?' sel':''}" data-status="${lab}">
      <div class="lab">${lab}</div><div class="val">${n}</div><div class="bar"></div>
      <div class="hint">${sel?'clear ✕':'filter'}</div></div>`;
  }).join('');
  kpis.querySelectorAll('.kpi').forEach(k=>k.onclick=()=>{
    filters.status = filters.status===k.dataset.status ? null : k.dataset.status;
    renderKPIs(DATA); applyView();
  });
}

function sigChip(kind,label){
  const t=TIER[label]??0;
  return `<span class="sig tier-${t}"><span class="dot"></span><span class="k">${kind}</span><span class="v">${label}</span></span>`;
}

function critPill(crit){
  if(!crit) return '';
  const cls=CRIT_CLASS[crit]||'rs';
  return `<span class="crit-pill ci-${cls}" title="Patient-impact criticality (informational)">${crit}</span>`;
}

// Card chip: worst recent patient-impact level (informational, violet axis)
function impactChip(pi){
  if(!pi||!pi.total) return '';
  const worst=pi.worst||'None';
  const r=IMPACT_RANK[worst]??0;
  return `<span class="impact-chip im-${r}"><span class="dot"></span><span class="k">Impact</span><span>${worst}</span></span>`;
}

// Detail block: full recent patient-impact breakdown
function impactBlock(pi,crit){
  if(!pi) return '';
  const counts=pi.counts||{};
  const total=pi.total||0;
  const worst=pi.worst||'None';
  const r=IMPACT_RANK[worst]??0;
  const seg=IMPACT_LEVELS.map((lvl,i)=>{
    const n=counts[lvl]||0; if(!n||!total) return '';
    return `<span style="width:${(n/total*100).toFixed(1)}%;background:${IMPACT_HEX[i]}"></span>`;
  }).join('');
  const legend=IMPACT_LEVELS.map((lvl,i)=>{
    const n=counts[lvl]||0; if(!n) return '';
    return `<span><i style="background:${IMPACT_HEX[i]}"></i>${lvl} ${n}</span>`;
  }).join('');
  const sub = total
    ? `${pi.elevated_count} of ${total} recent events carried clinical impact (Delayed Result or worse).`
    : 'No recent events to assess.';
  return `<div class="impact-block" style="--im:${IMPACT_HEX[r]}">
    <div class="lab"><span>Patient impact · recent</span><span class="note">informational · not scored</span></div>
    <div class="worst">${worst}</div>
    <div class="sub">${sub}</div>
    ${total?`<div class="impact-bar">${seg}</div><div class="impact-legend">${legend}</div>`:''}
  </div>`;
}

function renderList(list){
  const el=document.getElementById('deviceList');
  if(!list.length){
    el.innerHTML='<div class="list-empty">No devices match these filters.</div>';
    return;
  }
  el.innerHTML=list.map((d,i)=>{
    const cls=STATUS_CLASS[d.status];
    const col=tierColor(d.status==='Critical'?3:d.status==='At Risk'?2:d.status==='Watch'?1:0);
    const age=d.age_years==null?'—':d.age_years.toFixed(1)+'y';
    return `<div class="card" data-i="${i}">
      <div class="card-top">
        <span class="rank">${String(i+1).padStart(2,'0')}</span>
        <span class="did">${d.device_id}</span>
        <span class="model">${d.model||''} · ${age}</span>
        ${critPill(d.criticality)}
        <span class="status-tag t-${cls}">${d.status}</span>
      </div>
      <div class="score-row">
        <div class="score-track"><div class="score-fill" style="width:${d.risk_score}%;background:${col}"></div></div>
        <span class="score-num">${d.risk_score.toFixed(0)}</span>
      </div>
      <div class="sigs">
        ${sigChip('Freq',d.frequency.label)}
        ${sigChip('Sev',d.severity.label)}
        ${sigChip('Pattern',d.pattern.label)}
        ${impactChip(d.patient_impact)}
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.card').forEach(c=>c.onclick=()=>select(+c.dataset.i));
}

function signalBlock(name,sig){
  const t=TIER[sig.label]??0;
  return `<div class="signal-block tier-${t}">
    <div class="row"><span class="name">${name}</span><span class="lab">${sig.label}</span></div>
    <div class="exp">${sig.explanation||''}</div>
  </div>`;
}

function select(i){
  const d=view[i];
  if(!d) return;
  current=d.device_id;
  document.querySelectorAll('.card').forEach((c,j)=>c.classList.toggle('active',j===i));
  const age=d.age_years==null?'unknown':d.age_years.toFixed(1)+' yrs';
  const eol=d.end_of_life_watch?' · EOL watch':'';
  const crit=d.criticality?`<br>${d.criticality}`:'';
  const pageLink = (DATA&&DATA.source==='sample fleet')
    ? `<a class="page-link" href="/device/${encodeURIComponent(d.device_id)}">Full device page ↗</a>` : '';
  document.getElementById('detail').innerHTML=`
    <div class="d-head">
      <h2>${d.device_id}</h2>
      <span class="status-tag t-${STATUS_CLASS[d.status]}">${d.status} · ${d.risk_score.toFixed(0)}</span>
      <div class="d-meta">${d.model||'—'}<br>${age}${eol}<br>${d.recent_event_count} recent / ${d.baseline_event_count} baseline${crit}</div>
    </div>
    ${pageLink}
    ${signalBlock('Frequency',d.frequency)}
    ${signalBlock('Severity',d.severity)}
    ${signalBlock('Pattern concentration',d.pattern)}
    ${impactBlock(d.patient_impact,d.criticality)}
    <div class="action"><div class="lab">Recommended action</div><div class="txt">${d.recommended_action}</div></div>
    <ul class="reasons">${d.reasons.map(r=>`<li>${r}</li>`).join('')}</ul>`;
}

// Filter + sort DATA.devices into `view`, render the list, keep selection.
function applyView(){
  if(!DATA) return;
  const q=filters.q.trim().toLowerCase();
  view=DATA.devices.filter(d=>{
    if(filters.status && d.status!==filters.status) return false;
    if(filters.crit!=='all' && (d.criticality||'')!==filters.crit) return false;
    if(q && !`${d.device_id} ${d.model||''}`.toLowerCase().includes(q)) return false;
    return true;
  });
  const impactRank=d=>d.patient_impact?(IMPACT_RANK[d.patient_impact.worst]??0):-1;
  const s=filters.sort;
  view.sort((a,b)=>{
    if(s==='age')    return (b.age_years??-1)-(a.age_years??-1) || b.risk_score-a.risk_score;
    if(s==='crit')   return (CRIT_RANK[b.criticality]??-1)-(CRIT_RANK[a.criticality]??-1) || b.risk_score-a.risk_score;
    if(s==='impact') return impactRank(b)-impactRank(a) || b.risk_score-a.risk_score;
    return b.risk_score-a.risk_score;
  });

  renderList(view);
  const active=filters.status||filters.crit!=='all'||q;
  document.getElementById('count').innerHTML=
    `Showing <b>${view.length}</b> of ${DATA.total}${active?' · filtered':''}`;

  if(!view.length){
    current=null;
    document.getElementById('detail').innerHTML='<div class="empty">No devices match these filters.</div>';
    return;
  }
  const keep=current==null?-1:view.findIndex(d=>d.device_id===current);
  select(keep>=0?keep:0);
}

function render(data){
  DATA=data; current=null;
  document.getElementById('mSource').textContent=data.source;
  document.getElementById('mAsOf').textContent=data.as_of;
  renderMonitor(data); renderKPIs(data); applyView();
}

async function loadSample(){
  const r=await fetch('/api/fleet'); render(await r.json());
}
async function uploadLog(file){
  const fd=new FormData(); fd.append('events',file);
  const r=await fetch('/api/analyze',{method:'POST',body:fd});
  const j=await r.json();
  if(j.error){alert(j.error);return;}
  render(j);
}

drawGrid();
document.getElementById('reload').onclick=loadSample;
document.getElementById('upEvents').onchange=e=>{if(e.target.files[0])uploadLog(e.target.files[0]);};

// control bar
document.getElementById('search').oninput=e=>{filters.q=e.target.value; applyView();};
document.getElementById('critFilter').onchange=e=>{filters.crit=e.target.value; applyView();};
document.getElementById('sortBy').onchange=e=>{filters.sort=e.target.value; applyView();};
document.getElementById('clearFilters').onclick=()=>{
  filters.q=''; filters.status=null; filters.crit='all'; filters.sort='risk';
  document.getElementById('search').value='';
  document.getElementById('critFilter').value='all';
  document.getElementById('sortBy').value='risk';
  renderKPIs(DATA); applyView();
};

loadSample();
</script>
</body>
</html>
